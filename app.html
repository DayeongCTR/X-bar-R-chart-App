<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X̄–R 관리도</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyBoQVhlAnvKwVHRfHECC4kxTNxoGYDDI-U",
  authDomain: "x-bar-r.firebaseapp.com",
  databaseURL: "https://x-bar-r-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "x-bar-r",
  storageBucket: "x-bar-r.firebasestorage.app",
  messagingSenderId: "410510666424",
  appId: "1:410510666424:web:aa33719d8617dfdd60624d",
  measurementId: "G-X80ZHJRLJ2"
};
const FB_DB_URL = firebaseConfig.databaseURL;
</script>
<style>
:root{
  --bg:#0d1117;--sur:#161b22;--sur2:#21262d;--sur3:#2d333b;
  --bdr:#373e47;--bdr2:#545d68;
  --acc:#58a6ff;--red:#f85149;--grn:#3fb950;--yel:#d29922;
  --tx:#ffffff;--tx2:#dddddd;--tx3:#aaaaaa;
  --ucl:#ff6b6b;--cl:#4ade80;--lcl:#60a5fa;
  --r:6px;--font:system-ui,-apple-system,sans-serif;--mono:'Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:var(--font);font-size:13px;display:flex;flex-direction:column}
.outer{flex:1;display:flex;overflow:hidden;min-height:0}

/* LEFT */
.left{width:280px;min-width:260px;flex-shrink:0;background:var(--sur);border-right:2px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.mini-dash{background:#0a0e14;border-bottom:2px solid var(--bdr);padding:8px 10px;display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.md-row{display:flex;gap:5px;align-items:center}
.md-lbl{font-size:12px;color:var(--tx3);font-weight:700;white-space:nowrap;min-width:32px}
.md-sel{background:var(--sur2);border:1px solid var(--bdr2);border-radius:4px;color:var(--tx);font-size:14px;padding:4px 7px;cursor:pointer;flex:1;min-width:0}
.md-sel option{background:#1a2030}

/* Stats table in dashboard */
.stat-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:3px}
.stat-tbl td{padding:3px 6px;border:1px solid var(--bdr);white-space:nowrap}
.stat-tbl .st-lbl{color:var(--tx3);background:var(--sur3);font-size:11px;text-align:right;font-weight:700;width:50%}
.stat-tbl .st-v{font-family:var(--mono);font-weight:700;font-size:13px;text-align:center}
.sv-ucl{color:var(--ucl)}.sv-cl{color:var(--cl)}.sv-lcl{color:var(--lcl)}.sv-spec{color:#e879f9}.sv-n{color:var(--acc)}

.md-btns{display:flex;gap:4px;margin-top:2px}
.md-btn{background:var(--sur2);border:1px solid var(--bdr2);border-radius:4px;color:var(--tx2);cursor:pointer;font-size:14px;font-weight:600;padding:5px 10px;white-space:nowrap}
.md-btn:hover{border-color:var(--acc);color:var(--acc)}

.inp-wrap{flex:1;overflow-y:auto;padding:10px}
.sec-h{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--tx3);margin-bottom:8px}
.input-area{background:#1e2430;border:2px solid var(--bdr2);border-radius:var(--r);padding:9px}
.date-row{display:flex;gap:5px;align-items:center;margin-bottom:8px}
.date-inp-wrap{position:relative;flex:1}
.date-inp-wrap input[type="date"]{width:100%;background:#fff;border:1.5px solid #888;border-radius:4px;color:#111;padding:4px 6px;font-size:13px;font-weight:600;color-scheme:light}
.date-inp-wrap input[type="date"]:focus{outline:none;border-color:#3b82f6}
.today-btn{background:#334155;border:1px solid #556;border-radius:4px;color:#fff;cursor:pointer;font-size:11px;padding:4px 7px;white-space:nowrap}
.today-btn:hover{background:#475569}

.mrow{display:grid;grid-template-columns:26px 1fr 44px;gap:4px;align-items:center;margin-bottom:4px}
.mlbl{font-size:13px;color:#aaa;font-weight:700;text-align:right;font-family:var(--mono)}
.mrow input{background:#fff;border:1.5px solid #888;border-radius:4px;color:#111;padding:5px 7px;font-size:14px;font-family:var(--mono);width:100%;-moz-appearance:textfield}
.mrow input::-webkit-inner-spin-button,.mrow input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.mrow input:focus{outline:none;border-color:#3b82f6}
.clrb{background:transparent;border:none;color:#888;cursor:pointer;font-size:13px;padding:0}
.clrb:hover{color:var(--red)}
.prog-wrap{background:var(--sur3);border-radius:3px;height:4px;margin-top:8px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:var(--grn);transition:width .3s}
.prog-lbl{font-size:12px;color:var(--tx3);margin-top:3px}
.pend-note{background:#1c180a;border:1px solid var(--yel);border-radius:4px;color:var(--yel);font-size:11px;padding:6px 8px;margin-top:6px;display:none;line-height:1.4}
.act-row{display:flex;gap:5px;margin-top:8px}
.save-btn{flex:1;background:var(--acc);border:none;border-radius:var(--r);color:#0d1117;cursor:pointer;font-size:13px;font-weight:700;padding:7px}
.save-btn:hover{opacity:.85}
.cnt-box{margin-top:8px;font-size:13px;color:var(--tx2)}

/* RIGHT */
.right{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.charts-area{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.chart-row{display:flex;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;min-height:280px}
.np{width:100px;flex-shrink:0;background:#0e1420;border-right:1px solid var(--bdr);display:flex;flex-direction:column;padding:7px 6px;gap:3px}
.np-t{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--tx3);text-align:center;margin-bottom:5px}
.np-g{display:grid;grid-template-columns:1fr 1fr;gap:3px;flex:1}
.nb{border-radius:4px;border:1.5px solid var(--bdr2);cursor:pointer;font-size:11px;font-weight:700;font-family:var(--mono);background:var(--sur2);color:var(--tx2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:4px 3px;transition:all .2s}
.nb:hover{border-color:var(--acc)}.nb .nn{font-size:13px;font-weight:800}.nb .ns{font-size:10px;letter-spacing:.3px;text-align:center}
.nb.ok{background:#0d2818;border-color:var(--grn);color:var(--grn)}
.nb.viol{background:#2d0a09;border-color:var(--red);color:var(--red);animation:pb 1.5s infinite}
.nb.hl{box-shadow:0 0 0 2px #fff,0 0 8px rgba(255,255,255,.4)!important}
@keyframes pb{0%,100%{box-shadow:0 0 0 0 rgba(248,81,73,.6)}50%{box-shadow:0 0 0 5px rgba(248,81,73,0)}}
.ci{flex:1;display:flex;flex-direction:column;padding:9px 11px;min-width:0}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.ct{font-size:14px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--tx2)}
.cl-leg{display:flex;gap:10px;flex-wrap:wrap}
.cl-item{display:flex;align-items:center;gap:3px;font-size:13px;font-weight:600}
.cl-line{width:16px;height:0;border-top-width:2px;border-top-style:dashed;flex-shrink:0}
.cw{flex:1;min-height:0;height:250px;position:relative}

/* RAW TABLE */
.raw-card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:9px 11px}
.raw-hdr{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--tx3);margin-bottom:6px;display:flex;justify-content:space-between}
.raw-hdr span{color:var(--tx2);font-weight:400;font-size:11px;text-transform:none;letter-spacing:0}
.ts{overflow-x:auto}
.rt{border-collapse:collapse;font-size:11px;font-family:var(--mono);table-layout:fixed}
.rt th{background:var(--sur3);color:var(--tx);font-size:11px;font-weight:700;padding:3px 8px;text-align:center;border:1px solid var(--bdr);white-space:nowrap}
.rt td{padding:2px 8px;text-align:center;border:1px solid var(--bdr);color:var(--tx);white-space:nowrap}
.rt tr:hover td{background:var(--sur2)}
.rl{background:var(--sur3)!important;color:var(--tx2);font-weight:700}
.cv{color:var(--red)!important;font-weight:700}

/* TOOLTIP */
.tip{position:fixed;background:#1a2030;border:1px solid var(--bdr2);border-radius:var(--r);color:var(--tx);font-size:13px;padding:8px 12px;pointer-events:none;z-index:9999;max-width:270px;line-height:1.55;display:none;box-shadow:0 6px 20px rgba(0,0,0,.6)}

/* PASSWORD */
.pw-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;align-items:center;justify-content:center}
.pw-overlay.open{display:flex}
.pw-box{background:#161b22;border:1px solid var(--bdr2);border-radius:10px;padding:28px 30px;width:280px;text-align:center}
.pw-box h2{font-size:16px;margin-bottom:5px;color:var(--tx)}
.pw-box p{font-size:13px;color:var(--tx3);margin-bottom:16px}
.pw-dots{display:flex;justify-content:center;gap:10px;margin-bottom:18px}
.pw-dot{width:14px;height:14px;border-radius:50%;background:var(--sur3);border:2px solid var(--bdr2);transition:all .15s}
.pw-dot.filled{background:var(--acc);border-color:var(--acc)}
.pw-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:200px;margin:0 auto}
.pw-key{background:var(--sur2);border:1px solid var(--bdr2);border-radius:8px;color:var(--tx);cursor:pointer;font-size:18px;font-weight:700;padding:12px;transition:all .15s}
.pw-key:hover{background:var(--sur3);border-color:var(--acc)}
.pw-key.del{font-size:14px;color:var(--tx3)}
.pw-err{color:var(--red);font-size:13px;margin-top:10px;height:18px}

/* SETTINGS MODAL */
.cfg-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center}
.cfg-overlay.open{display:flex}
.cfg-modal{background:#161b22;border:1px solid var(--bdr2);border-radius:10px;width:800px;max-width:97vw;max-height:92vh;display:flex;flex-direction:column}
.cfg-head{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid var(--bdr)}
.cfg-head h2{font-size:16px;font-weight:700;color:var(--tx)}
.cfg-close{background:transparent;border:none;color:var(--tx3);cursor:pointer;font-size:20px;padding:0}
.cfg-close:hover{color:var(--tx)}
.cfg-tabs{display:flex;border-bottom:1px solid var(--bdr);padding:0 16px}
.cfg-tab{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--tx3);cursor:pointer;font-size:15px;font-weight:600;padding:9px 14px;transition:all .15s}
.cfg-tab:hover{color:var(--tx)}.cfg-tab.on{border-bottom-color:var(--acc);color:var(--acc)}
.cfg-body{flex:1;overflow-y:auto;padding:16px 20px}
.mf{margin-bottom:13px}
.mf label{display:block;color:var(--tx2);font-size:13px;margin-bottom:5px;font-weight:600}
.mf input,.mf select{width:100%;background:var(--sur2);border:1px solid var(--bdr2);border-radius:var(--r);color:var(--tx);padding:7px 10px;font-size:14px}
.mf input[type="date"]{color-scheme:dark}
.mf-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cfg-acts{padding:12px 20px;border-top:1px solid var(--bdr);display:flex;gap:8px;justify-content:flex-end}
.mbtn{border-radius:var(--r);cursor:pointer;font-size:14px;font-weight:600;padding:7px 18px;border:none}
.mbtn.p{background:var(--acc);color:#0d1117}.mbtn.s{background:var(--sur2);border:1px solid var(--bdr2);color:var(--tx)}

/* ITEM LISTS */
.lm-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.col-section{display:flex;flex-direction:column;gap:6px}
.col-h{font-size:13px;font-weight:700;color:var(--tx2);margin-bottom:2px}
.item-list{display:flex;flex-direction:column;gap:3px;border:1px solid var(--bdr);border-radius:4px;padding:4px;min-height:60px;max-height:170px;overflow-y:auto;background:var(--bg)}.item-list.dim-list{max-height:420px}
.item-row{display:flex;align-items:center;gap:5px;background:var(--sur2);border:1px solid var(--bdr);border-radius:4px;padding:4px 8px;cursor:grab;user-select:none}
.item-row:active{opacity:.7}
.item-drag{color:var(--tx3);font-size:15px;flex-shrink:0}
.item-name{flex:1;font-size:13px;color:var(--tx)}
.ibtn-sm{background:transparent;border:1px solid var(--bdr2);border-radius:3px;cursor:pointer;font-size:12px;padding:2px 7px;color:var(--tx2)}
.ibtn-sm:hover{border-color:var(--acc);color:var(--acc)}
.ibtn-sm.del-sm{border-color:transparent;color:var(--tx3)}
.ibtn-sm.del-sm:hover{border-color:var(--red);color:var(--red)}
.add-row{display:flex;gap:5px;margin-top:4px}
.add-row input{flex:1;background:var(--sur2);border:1px solid var(--bdr2);border-radius:4px;color:var(--tx);padding:5px 9px;font-size:13px}
.add-btn{background:var(--grn);border:none;border-radius:4px;color:#0d1117;cursor:pointer;font-size:13px;font-weight:700;padding:5px 12px;white-space:nowrap}
.line-sel-row{display:flex;align-items:center;gap:8px;margin:8px 0 4px}
.line-sel-row label{font-size:12px;color:var(--tx3);font-weight:600;white-space:nowrap}
.line-sel-row select{flex:1;background:var(--sur2);border:1px solid var(--bdr2);border-radius:4px;color:var(--tx);padding:4px 8px;font-size:13px}
.dsel{background:var(--sur2);border:1px solid var(--bdr2);border-radius:4px;color:var(--tx);padding:6px 10px;font-size:14px}
.dsel option{background:#1a2030}
.msel{position:relative;display:inline-block}
.msel-btn{display:flex;justify-content:space-between;align-items:center;gap:8px;cursor:pointer;width:100%}
.msel-panel{position:absolute;top:calc(100% + 2px);left:0;z-index:80;background:var(--sur2);border:1px solid var(--bdr2);border-radius:4px;max-height:390px;overflow-y:auto;width:240px;padding:4px;box-shadow:0 6px 20px rgba(0,0,0,.5)}
.msel-panel label{display:block;padding:4px 6px;font-size:13px;color:var(--tx);cursor:pointer;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msel-panel label:hover{background:var(--sur3)}
.msel-panel input[type=checkbox]{margin-right:6px}

/* SPEC MATRIX */
.smt{border-collapse:collapse;min-width:100%}
.smt th,.smt td{border:1px solid var(--bdr);padding:4px 10px;text-align:center;font-size:13px}
.smt th{background:var(--sur3);color:var(--tx);font-weight:700}
.smt td{background:var(--sur2)}
.smt th:nth-child(1),.smt td:nth-child(1){position:sticky;left:0;z-index:2}
.smt th:nth-child(2),.smt td:nth-child(2){position:sticky;left:150px;z-index:2}
.smt input{background:transparent;border:none;color:var(--tx);font-size:13px;width:70px;text-align:center;padding:2px}
.smt input:focus{outline:1px solid var(--acc);border-radius:3px}

/* DATE RANGE */
.dr-box{background:#0e1420;border:1px solid var(--bdr);border-radius:var(--r);padding:12px;margin-top:4px}
.dr-tabs{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.dr-tab{background:var(--sur2);border:1px solid var(--bdr);border-radius:4px;color:var(--tx3);cursor:pointer;font-size:13px;padding:5px 12px}
.dr-tab.on{background:var(--acc);border-color:var(--acc);color:#0d1117;font-weight:700}

/* RDE */
.rde-top-bar{display:flex;align-items:flex-end;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.rde-sel-grp{display:flex;flex-direction:column;gap:3px}
.rde-sel-grp label{font-size:12px;color:var(--tx2);font-weight:600}
.rde-sel-grp select{background:var(--sur2);border:1px solid var(--bdr2);border-radius:var(--r);color:var(--tx);padding:5px 9px;font-size:13px}
.excel-btn{background:#2ea043;border:none;border-radius:var(--r);color:#fff;cursor:pointer;font-size:13px;font-weight:600;padding:6px 12px;white-space:nowrap}
.excel-btn:hover{background:#3fb950}
.add-row-btn{background:var(--sur2);border:1px dashed var(--bdr2);border-radius:4px;color:var(--tx3);cursor:pointer;font-size:13px;padding:5px 12px;white-space:nowrap}
.add-row-btn:hover{border-color:var(--acc);color:var(--acc)}
.rde-hint{font-size:12px;color:var(--tx3);margin-bottom:8px}
.rdt{border-collapse:collapse;width:100%;font-size:13px;font-family:var(--mono)}
.rdt th{background:var(--sur3);color:var(--tx);font-size:12px;padding:5px 8px;border:1px solid var(--bdr);white-space:nowrap;text-align:center}
.rdt td{padding:3px 4px;border:1px solid var(--bdr);text-align:center}
.rdt input[type="date"]{background:#fff;border:1px solid #888;border-radius:3px;color:#111;font-size:11px;padding:2px 3px;width:115px;color-scheme:light}
.rdt input[type="number"]{background:#fff;border:1px solid #888;border-radius:3px;color:#111;font-size:12px;width:76px;padding:2px 4px;-moz-appearance:textfield}
.rdt input[type="number"]::-webkit-inner-spin-button,.rdt input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.rdel{color:var(--red);cursor:pointer;font-size:15px;background:transparent;border:none;padding:0 4px}
.rdel:hover{color:#fca5a5}
.cp-row{background:#1c180a}

.toast{position:fixed;bottom:20px;right:20px;background:var(--grn);color:#0d1117;font-weight:700;padding:9px 16px;border-radius:var(--r);font-size:14px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:600}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="outer">
<div class="left">
  <div class="mini-dash">
    <div class="md-row"><span class="md-lbl">라인</span><select class="md-sel" id="selLine" onchange="onSelLine()"></select></div>
    <div class="md-row"><span class="md-lbl">품번</span><select class="md-sel" id="selProd" onchange="onSelProd()"></select></div>
    <div class="md-row"><span class="md-lbl">치수</span><select class="md-sel" id="selDim"  onchange="onSelDim()"></select></div>
    <table class="stat-tbl" id="statTbl">
      <tr><td class="st-lbl">USL(X̄)</td><td class="st-v sv-spec" id="di-usl">—</td><td class="st-lbl">USL(R)</td><td class="st-v sv-spec">—</td></tr>
      <tr><td class="st-lbl">UCL(X̄)</td><td class="st-v sv-ucl" id="di-ucl">—</td><td class="st-lbl">UCL(R)</td><td class="st-v sv-ucl" id="di-uclr">—</td></tr>
      <tr><td class="st-lbl">X̄̄</td><td class="st-v sv-cl" id="di-xbb">—</td><td class="st-lbl">R̄</td><td class="st-v sv-cl" id="di-rb">—</td></tr>
      <tr><td class="st-lbl">LCL(X̄)</td><td class="st-v sv-lcl" id="di-lcl">—</td><td class="st-lbl">LCL(R)</td><td class="st-v sv-lcl" id="di-lclr">—</td></tr>
      <tr><td class="st-lbl">LSL(X̄)</td><td class="st-v sv-spec" id="di-lsl">—</td><td class="st-lbl">LSL(R)</td><td class="st-v sv-spec">—</td></tr>
      <tr><td class="st-lbl">군 크기</td><td class="st-v sv-n" id="di-n">3</td><td class="st-lbl">표시 군</td><td class="st-v sv-n" id="di-k">0</td></tr>
    </table>
    <div class="md-btns"><button class="md-btn" style="flex:1" onclick="openPwModal()">⚙ 설정</button></div>
  </div>
  <div class="inp-wrap">
    <div class="sec-h">측정값 입력</div>
    <div class="input-area">
      <div class="date-row" style="display:grid;grid-template-columns:26px 1fr 44px;gap:4px;align-items:center;margin-bottom:8px">
        <label class="mlbl" style="font-size:10px;white-space:nowrap">날짜</label>
        <div class="date-inp-wrap">
          <input type="date" id="inDate" onchange="onDateChange()" oninput="onDateRaw(event)" style="width:100%">
        </div>
        <button class="today-btn" onclick="saveEntry()" style="padding:5px 2px;font-size:11px;width:100%">저장</button>
      </div>
      <div id="measGrid"></div>
      <div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:0"></div></div>
      <div class="prog-lbl" id="progLbl">0 / 3 입력됨</div>
      <div class="pend-note" id="pendNote">⚠ 군 크기 미달 — 백업 저장</div>
      
    </div>

// ═══ HELPERS ═══
function getKey(l,p,d){return `${l}__${p}__${d}`;}
function curKey(){return getKey(curLine,curProd,curDim);}
function ensureData(key){
  if(!allData[key]){
    const dk=getKey(cfg.lines[0],(cfg.lineProds[cfg.lines[0]]||[])[0],(cfg.dims||[])[0]);
    allData[key]=key===dk?{complete:JSON.parse(JSON.stringify(PRELOAD_C)),pending:JSON.parse(JSON.stringify(PRELOAD_P))}:{complete:[],pending:[]};
  }
}
function getSpec(){return cfg.specs[`${curLine}__${curProd}__${curDim}`]||{lsl:null,usl:null};}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function shortDate(s){
  if(!s)return '';
  if(s.indexOf('-')>=0){const p=s.split('-').map(Number);return p.length>=3?`${p[1]}/${p[2]}`:s;}
  return s;
}
function dateNum(s){
  if(!s)return 0;
  if(s.indexOf('-')>=0){const t=new Date(s).getTime();return isNaN(t)?0:t;}
  const p=s.split('/').map(Number);return(p[0]||0)*100+(p[1]||0);// legacy M/D (연도 없음, 항상 새 날짜보다 작게 정렬됨)
}
function sortD(arr){arr.sort((a,b)=>dateNum(a.date)-dateNum(b.date));}
function toDateInput(s){// legacy "M/D" -> "YYYY-MM-DD" (연도는 현재연도로 가정), 이미 "YYYY-MM-DD"면 그대로
  if(!s)return '';
  if(s.indexOf('-')>=0)return s;
  const p=s.split('/').map(Number);if(p.length<2)return '';
  const y=new Date().getFullYear();return `${y}-${String(p[0]).padStart(2,'0')}-${String(p[1]).padStart(2,'0')}`;
}
function fromDateInput(v){// "YYYY-MM-DD" 그대로 저장 (연도 보존)
  if(!v)return '';return v;
}
// Compact sparse array: remove trailing nulls, keep internal structure
function sparseValues(vals){// remove trailing nulls only
  let arr=[...vals];while(arr.length>0&&(arr[arr.length-1]==null))arr.pop();return arr;
}
// Count non-null values
function countVals(vals){return vals.filter(v=>v!=null&&v!==undefined&&v!=='').length;}
// Sum/avg/min/max ignoring nulls
function validVals(vals){return vals.filter(v=>v!=null&&!isNaN(v));}


// ═══ FORMAT VALUE (show as-entered, no forced decimal places) ═══
function fmtV(v){
  if(v==null||isNaN(v))return '—';
  // Round to reasonable precision (avoid floating point noise like 44.730000000001)
  const rounded=Math.round(v*10000)/10000;
  return String(rounded);
}

// ═══ TODAY KEY (오전8시 이전은 전날로) ═══
function getTodayKey(){
  const now=new Date();
  // If before 08:00, use previous day
  if(now.getHours()<8){now.setDate(now.getDate()-1);}
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
}

// ═══ INPUT CACHE (per combination, keyed by "line__prod__dim__date") ═══
// Stores: { date: "YYYY-MM-DD", slots: [v0,v1,...,v5] }
const inputCache = {};

function cacheKey(){return curKey();}

function autoSavePendingInputs(){
  if(autoSaveTimer){clearTimeout(autoSaveTimer);autoSaveTimer=null;}
  // Cache raw UI state so returning to this combo restores exactly what was there
  const dInp=document.getElementById('inDate');
  if(!dInp)return;
  const dateVal=dInp.value;
  const slots=[];let hasAny=false;
  for(let i=1;i<=6;i++){
    const el=document.getElementById(`m${i}`);
    const v=el&&el.value.trim()!==''?el.value:null;
    slots[i-1]=v;
    if(v!==null)hasAny=true;
  }
  if(hasAny||dateVal)inputCache[cacheKey()]={date:dateVal,slots};
  // Also actually save entered values to allData/Firebase before switching combo
  const dv=fromDateInput(dateVal);
  if(!dv||!hasAny)return; // nothing entered — nothing to persist
  const vals=new Array(6).fill(null);let hasVal=false;
  for(let i=1;i<=6;i++){
    if(slots[i-1]!=null){
      const v=parseFloat(slots[i-1]);
      if(!isNaN(v)){vals[i-1]=v;hasVal=true;}
    }
  }
  if(!hasVal)return;
  const trimmed=sparseValues(vals);
  const cnt=countVals(trimmed);
  const key=curKey();ensureData(key);const pd=allData[key];
  const ci=pd.complete.findIndex(d=>d.date===dv),pi=pd.pending.findIndex(d=>d.date===dv);
  if(cnt>=cfg.n){
    if(ci>=0)pd.complete[ci].values=trimmed;
    else{if(pi>=0)pd.pending.splice(pi,1);pd.complete.push({date:dv,values:trimmed});}
    sortD(pd.complete);
  }else{
    if(pi>=0)pd.pending[pi].values=trimmed;
    else if(ci>=0){pd.complete.splice(ci,1);pd.pending.push({date:dv,values:trimmed});}
    else pd.pending.push({date:dv,values:trimmed});
    sortD(pd.pending);
  }
  saveStore();
}

function restorePendingInputs(){
  const cached=inputCache[cacheKey()];
  // Determine today's date key for auto-fill
  const todayStr=getTodayKey();
  if(cached){
    const el=document.getElementById('inDate');
    if(el)el.value=cached.date||todayStr;
    for(let i=1;i<=6;i++){
      const m=document.getElementById(`m${i}`);
      if(m)m.value=cached.slots[i-1]??'';
    }
  }else{
    // Set date to today, clear slots
    const el=document.getElementById('inDate');
    if(el)el.value=todayStr;
    for(let i=1;i<=6;i++){const m=document.getElementById(`m${i}`);if(m)m.value='';}
  }
  onMIn();
}

// ═══ DATE INPUT ═══
function setToday(){const v=getTodayKey();document.getElementById('inDate').value=v;}
function onDateChange(){}
function onDateRaw(e){
  // Allow yymmdd shorthand: if user types 6 digits interpret as MMDDYY or YYMMDD
  // We'll handle via blur
}
document.getElementById && document.addEventListener('DOMContentLoaded',()=>{
  const inp=document.getElementById('inDate');
  if(inp){inp.addEventListener('blur',handleDateShorthand);}
});
function handleDateShorthand(){
  const inp=document.getElementById('inDate');if(!inp)return;
  const raw=inp.value.replace(/[-\/\s]/g,'');
  if(/^\d{6}$/.test(raw)){
    // Try YYMMDD: e.g. 260703 → 2026-07-03
    const yy=parseInt(raw.slice(0,2)),mm=parseInt(raw.slice(2,4)),dd=parseInt(raw.slice(4,6));
    if(mm>=1&&mm<=12&&dd>=1&&dd<=31){
      const yyyy=2000+yy;
      inp.value=`${yyyy}-${String(mm).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
      return;
    }
    // Try MMDDYY fallback
    const mm2=parseInt(raw.slice(0,2)),dd2=parseInt(raw.slice(2,4)),yy2=parseInt(raw.slice(4,6));
    if(mm2>=1&&mm2<=12&&dd2>=1&&dd2<=31){
      const yyyy2=2000+yy2;
      inp.value=`${yyyy2}-${String(mm2).padStart(2,'0')}-${String(dd2).padStart(2,'0')}`;
    }
  }
}

// ═══ MEAS GRID (sparse — x1..x6 with individual slots) ═══
function buildMeasGrid(){
  const g=document.getElementById('measGrid');g.innerHTML='';
  for(let i=1;i<=6;i++){
    const r=document.createElement('div');r.className='mrow';
    r.innerHTML=`<span class="mlbl">x${i}</span><input type="number" step="0.001" id="m${i}" placeholder="—" oninput="onMIn()" onkeydown="onMK(event,${i})"><button class="clrb" onclick="clrM(${i})">✕</button>`;
    g.appendChild(r);
  }
}
function onMK(e,i){if(e.key==='Enter'){const nx=document.getElementById(`m${i+1}`);if(nx)nx.focus();else saveEntry();}}
function clrM(i){const el=document.getElementById(`m${i}`);if(el){el.value='';onMIn();}}
let autoSaveTimer=null;
function onMIn(){
  let cnt=0;for(let i=1;i<=6;i++){const el=document.getElementById(`m${i}`);if(el&&el.value.trim()!=='')cnt++;}
  document.getElementById('progFill').style.width=Math.min(100,(cnt/cfg.n)*100)+'%';
  document.getElementById('progLbl').textContent=`${cnt} / ${cfg.n} 입력됨${cnt>=cfg.n?' ✓':''}`;
  document.getElementById('pendNote').style.display=(cnt>0&&cnt<cfg.n)?'block':'none';
  if(autoSaveTimer)clearTimeout(autoSaveTimer);
  if(cnt>=cfg.n)autoSaveTimer=setTimeout(saveEntry,900);
}

// ═══ SAVE ENTRY (sparse values preserved) ═══
function saveEntry(){
  if(autoSaveTimer){clearTimeout(autoSaveTimer);autoSaveTimer=null;}
  const dInp=document.getElementById('inDate');
  handleDateShorthand();
  const dv=fromDateInput(dInp.value);
  if(!dv){showToast('날짜 입력 필요','warn');return;}
  // Build sparse array: index 0..5 = x1..x6, null if empty — preserve slot positions
  const vals=new Array(6).fill(null);let hasVal=false;
  for(let i=1;i<=6;i++){
    const el=document.getElementById(`m${i}`);
    if(el&&el.value.trim()!==''){
      const v=parseFloat(el.value);if(isNaN(v)){showToast(`x${i} 오류`,'warn');return;}
      vals[i-1]=v;hasVal=true;
    }
  }
  if(!hasVal){showToast('값 입력 필요','warn');return;}
  const trimmed=sparseValues(vals);
  const cnt=countVals(trimmed);
  const key=curKey();ensureData(key);const pd=allData[key];
  const ci=pd.complete.findIndex(d=>d.date===dv),pi=pd.pending.findIndex(d=>d.date===dv);
  if(cnt>=cfg.n){
    if(ci>=0)pd.complete[ci].values=trimmed;
    else{if(pi>=0)pd.pending.splice(pi,1);pd.complete.push({date:dv,values:trimmed});}
    sortD(pd.complete);showToast(`${dv} 저장`,'ok');
  }else{
    if(pi>=0)pd.pending[pi].values=trimmed;
    else if(ci>=0){pd.complete.splice(ci,1);pd.pending.push({date:dv,values:trimmed});}
    else pd.pending.push({date:dv,values:trimmed});
    sortD(pd.pending);showToast(`${dv} 백업 (${cnt}/${cfg.n})`,'warn');
  }
  saveStore();
  hlX=null;hlR=null;render();
}

// ═══ VIEW WINDOW ═══
function getViewData(){
  const key=curKey();ensureData(key);
  const all=[...allData[key].complete];sortD(all);
  if(!all.length)return[];
  const k=cfg.k||20,mode=cfg.drMode??0;
  if(mode===0)return all.slice(Math.max(0,all.length-k));
  if(mode===1&&cfg.drDate){const dn=dateNum(cfg.drDate);const si=Math.max(0,all.findIndex(d=>dateNum(d.date)>=dn));return all.slice(si,si+k);}
  if(mode===2&&cfg.drDate){const dn=dateNum(cfg.drDate);const filtered=all.filter(d=>dateNum(d.date)<=dn);return filtered.slice(Math.max(0,filtered.length-k));}
  return all.slice(Math.max(0,all.length-k));
}

// ═══ STATS ═══
function calcStats(groups){
  if(!groups||!groups.length)return null;
  const n=cfg.n,c=CC[Math.min(Math.max(n,2),10)];
  const g2=groups.map(d=>{
    const v=validVals(d.values);
    const xb=v.length?v.reduce((s,x)=>s+x,0)/v.length:0;
    const R=v.length>1?Math.max(...v)-Math.min(...v):0;
    return{date:d.date,v,xb,R};
  });
  const xbb=g2.reduce((s,g)=>s+g.xb,0)/g2.length,Rb=g2.reduce((s,g)=>s+g.R,0)/g2.length;
  const UCLx=xbb+c.A2*Rb,LCLx=xbb-c.A2*Rb,UCLr=c.D4*Rb,LCLr=c.D3*Rb;
  const sx=Math.max((UCLx-xbb)/3,0.0001),sr=Math.max((UCLr-Rb)/3,0.0001);
  return{groups:g2,xbb,Rb,UCLx,LCLx,UCLr,LCLr,sx,sr};
}

// ═══ NELSON ═══
function nelsonCheck(vals,CL,UCL,LCL,sx,isR){
  const n=vals.length,res={};
  res['1']=vals.map((v,i)=>(v>UCL||(LCL>0&&v<LCL))?i:-1).filter(i=>i>=0);
  const sw=(size,check)=>{const st=new Set();for(let i=size-1;i<n;i++){const seg=vals.slice(i-size+1,i+1);if(check(seg))for(let j=i-size+1;j<=i;j++)st.add(j);}return[...st];};
  res['2']=sw(9,s=>s.every(v=>v>CL)||s.every(v=>v<CL));
  res['3']=sw(6,s=>s.every((v,j)=>j===0||v>s[j-1])||s.every((v,j)=>j===0||v<s[j-1]));
  res['4']=sw(14,s=>{for(let j=1;j<s.length;j++){if(j>1&&(s[j]-s[j-1])*(s[j-1]-s[j-2])>=0)return false;}return true;});
  const s2U=CL+2*sx,s2L=CL-2*sx,s1U=CL+sx,s1L=CL-sx;
  const r5=new Set();for(let i=2;i<n;i++){const seg=vals.slice(i-2,i+1);const abv=seg.filter(v=>v>s2U).length,blw=seg.filter(v=>v<s2L).length;if(isR){if(abv>=2)seg.forEach((v,j)=>{if(v>s2U)r5.add(i-2+j);});}else{if(abv>=2||blw>=2)seg.forEach((v,j)=>{if(v>s2U||v<s2L)r5.add(i-2+j);});}}res['5']=[...r5];
  const r6=new Set();for(let i=4;i<n;i++){const seg=vals.slice(i-4,i+1);const abv=seg.filter(v=>v>s1U).length,blw=seg.filter(v=>v<s1L).length;if(isR){if(abv>=4)seg.forEach((v,j)=>{if(v>s1U)r6.add(i-4+j);});}else{if(abv>=4||blw>=4)seg.forEach((v,j)=>{if(v>s1U||v<s1L)r6.add(i-4+j);});}}res['6']=[...r6];
  res['7']=sw(15,s=>isR?s.every(v=>v<=s1U):s.every(v=>v>=s1L&&v<=s1U));
  res['8']=sw(8,s=>isR?s.every(v=>v>s1U):s.every(v=>v>s1U||v<s1L));
  return res;
}

  const labels=stats.groups.map(g=>shortDate(g.date)),xv=stats.groups.map(g=>g.xb),rv=stats.groups.map(g=>g.R),N=labels.length;

  const zone=(CL,sx,UCL,LCL)=>({id:'zone',beforeDatasetsDraw(ch){const ctx=ch.ctx,ya=ch.scales.y,ca=ch.chartArea;const band=(lo,hi,col)=>{const y1=ya.getPixelForValue(hi),y2=ya.getPixelForValue(lo);ctx.save();ctx.fillStyle=col;ctx.fillRect(ca.left,Math.min(y1,y2),ca.width,Math.abs(y2-y1));ctx.restore();};band(CL-sx,CL+sx,'rgba(63,185,80,.06)');band(CL+sx,CL+2*sx,'rgba(210,153,34,.07)');band(CL-2*sx,CL-sx,'rgba(210,153,34,.07)');band(CL+2*sx,UCL,'rgba(248,81,73,.09)');if(LCL<CL-2*sx)band(LCL,CL-2*sx,'rgba(248,81,73,.09)');}});
  const opts=(yMin,yMax)=>({responsive:true,maintainAspectRatio:false,animation:{duration:300},interaction:{mode:'index',intersect:false},layout:{padding:{left:0,right:0}},onResize:()=>{setTimeout(syncTableColsToChart,0);},plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a2030',borderColor:'#373e47',borderWidth:1,titleColor:'#fff',bodyColor:'#ccc',padding:10,callbacks:{label:ctx=>ctx.raw==null?null:` ${ctx.dataset.label}: ${typeof ctx.raw==='number'?ctx.raw.toFixed(4):'—'}`}}},scales:{x:{grid:{color:'rgba(55,62,71,.9)'},ticks:{color:'#ccc',maxRotation:45,font:{size:11}},border:{color:'#373e47'}},y:{min:yMin,max:yMax,afterFit:s=>{s.width=50;},grid:{color:'rgba(55,62,71,.9)'},ticks:{color:'#ccc',font:{size:11,family:"'Courier New',monospace"},callback:v=>v.toFixed(3)},border:{color:'#373e47'}}}});
  const xLim=[cL(stats.UCLx,'#ff6b6b',[6,3],'UCL'),cL(stats.xbb+2*stats.sx,'#fbbf24',[4,4],'+2σ'),cL(stats.xbb+stats.sx,'#fde68a',[2,4],'+1σ'),cL(stats.xbb,'#4ade80',[8,4],'CL'),cL(stats.xbb-stats.sx,'#bfdbfe',[2,4],'-1σ'),cL(stats.xbb-2*stats.sx,'#93c5fd',[4,4],'-2σ'),cL(stats.LCLx,'#60a5fa',[6,3],'LCL')];
  const xr=yR(xv,stats.UCLx,stats.LCLx);

  const rLim=[cL(stats.UCLr,'#ff6b6b',[6,3],'UCL'),cL(stats.Rb+2*stats.sr,'#fbbf24',[4,4],'+2σ'),cL(stats.Rb+stats.sr,'#fde68a',[2,4],'+1σ'),cL(stats.Rb,'#4ade80',[8,4],'CL')];
  if(stats.LCLr>0){rLim.push(cL(stats.Rb-stats.sr,'#bfdbfe',[2,4],'-1σ'));rLim.push(cL(stats.Rb-2*stats.sr,'#93c5fd',[4,4],'-2σ'));rLim.push(cL(stats.LCLr,'#60a5fa',[6,3],'LCL'));}
  const rr=yR(rv,stats.UCLr,Math.max(0,stats.LCLr));

// Read Chart.js's ACTUAL rendered pixel layout (chartArea) and apply those exact
// pixel widths to the raw-data table's columns — no guessing, always matches.
const NP_SIDEBAR_W=100, RAW_CARD_PAD=11;
function syncTableColsToChart(){
  const chart=xChart||rChart;if(!chart||!chart.chartArea)return;
  const table=document.getElementById('rawTable');if(!table)return;
  const ca=chart.chartArea;
  const N=(chart.data.labels||[]).length;if(!N)return;
  // Chart.js line charts place category points edge-to-edge (offset:false):
  // point 0 sits exactly at ca.left, point N-1 sits exactly at ca.right.
  // So each point's pixel = ca.left + i*step, step=(ca.right-ca.left)/(N-1).
  // To center each table column UNDER its point, each column must span
  // half a step on either side of the point — including a half-step
  // overhang before the first point and after the last point.
  const step=N>1?(ca.right-ca.left)/(N-1):(ca.right-ca.left);
  const half=step/2;
  const labelW=Math.max(20,Math.round(ca.left-half));
  table.style.marginLeft=Math.max(0,NP_SIDEBAR_W-RAW_CARD_PAD)+'px';
  table.style.width=Math.round(labelW+N*step)+'px';
  const headCells=table.querySelectorAll('thead th');
  if(headCells[0])headCells[0].style.width=labelW+'px';
  for(let i=1;i<headCells.length;i++)headCells[i].style.width=Math.round(step)+'px';
}

function renameProdCode(idx){
  const al=getAL();
  const oldCode=(cfg.lineProds[al]||[])[idx];if(oldCode===undefined)return;
  const nv=prompt(`품번 수정 (현재: ${oldCode})`,oldCode);
  if(!nv||nv.trim()===''||nv.trim().toUpperCase()===oldCode)return;
  const newCode=nv.trim().toUpperCase();
  if(!isValidProdCode(newCode)){alert(PROD_CODE_ERR);return;}
  const dupLine=findLineOfProd(newCode,al,idx);
  if(dupLine){alert(`이미 ${dupLine} 라인에 등록된 품번입니다.`);return;}
  // migrate name map
  if(cfg.prodNames[oldCode]!==undefined){cfg.prodNames[newCode]=cfg.prodNames[oldCode];delete cfg.prodNames[oldCode];}
  cfg.lineProds[al][idx]=newCode;
  // migrate specs referencing old code under this line
  Object.keys(cfg.specs).forEach(k=>{
    const parts=k.split('__');
    if(parts[0]===al&&parts[1]===oldCode){
      cfg.specs[`${al}__${newCode}__${parts[2]}`]=cfg.specs[k];delete cfg.specs[k];
    }
  });
  // migrate measurement data referencing old code under this line
  Object.keys(allData).forEach(k=>{
    const parts=k.split('__');
    if(parts[0]===al&&parts[1]===oldCode){
      allData[`${al}__${newCode}__${parts[2]}`]=allData[k];delete allData[k];
    }
  });
  if(curLine===al&&curProd===oldCode)curProd=newCode;
  document.getElementById('cfgBody').innerHTML=renderLM();
}

function rdeDel(ri){
  // First collect current edits so we operate on latest state
  _collectAndSaveRde();
  const all=getRdeAll();const row=all[ri];if(!row)return;
  if(!confirm(`${row.date||'빈 행'} 삭제?`))return;
  const key=rdeKey();ensureData(key);const pd=allData[key];
  if(row.date){
    pd[row.tp]=pd[row.tp].filter(d=>d.date!==row.date);
  }else{
    // remove first empty-date pending
    const emptyIdx=pd.pending.findIndex(d=>!d.date);
    if(emptyIdx>=0)pd.pending.splice(emptyIdx,1);
  }
  saveStore();render();document.getElementById('cfgBody').innerHTML=renderRde();showToast('삭제됨','ok');
}
function _collectAndSaveRde(){
  const key=rdeKey();ensureData(key);const pd=allData[key];
  const tbody=document.getElementById('rdeTbody');if(!tbody)return;
  const newC=[],newP=[];
  [...tbody.querySelectorAll('tr')].forEach(tr=>{
    const dInp=tr.querySelector('input[type="date"]');
    const dateStr=dInp?fromDateInput(dInp.value):'';
    if(!dateStr)return;
    // Collect sparse: slot 0..5 preserving positions
    const vals=new Array(6).fill(null);
    let hasAny=false;
    for(let xi=0;xi<6;xi++){
      const inp=tr.querySelector(`input[data-xi="${xi}"]`);
      if(inp&&inp.value.trim()!==''){
        const v=parseFloat(inp.value);
        if(!isNaN(v)){vals[xi]=v;hasAny=true;}
      }
    }
    if(!hasAny)return;
    const trimmed=sparseValues(vals);
    const cnt=countVals(trimmed);
    if(cnt>=cfg.n)newC.push({date:dateStr,values:trimmed});
    else if(cnt>0)newP.push({date:dateStr,values:trimmed});
  });
  sortD(newC);sortD(newP);
  pd.complete=newC;pd.pending=newP;
  saveStore();
}
function saveRde(){
  _collectAndSaveRde();render();document.getElementById('cfgBody').innerHTML=renderRde();showToast('로데이터 저장됨','ok');
}

  <div class="item-list" style="max-height:400px;overflow:visible">${adminRows||'<div style="color:var(--tx3);padding:8px;font-size:13px">등록된 관리자가 없습니다</div>'}</div>
  <div class="add-row">
    <input id="addAdmName" placeholder="새 관리자 이름" style="max-width:110px">
    <input id="addAdmEmail" placeholder="이메일 (@ctr.co.kr)">
    <button class="add-btn" onclick="addAdmin()">+ 추가</button>
  </div>
  <div class="col-h" style="margin-top:14px">미배정 제품 확인</div>
  ${renderUnassignedList()}`;
}
function safeId(s){return String(s).replace(/[^a-zA-Z0-9]/g,'_');}
function renderUnassignedList(){
  const assignedSet=new Set(cfg.assignments.map(x=>`${x.line}__${x.prod}`));
  const items=[];
  cfg.lines.forEach(ln=>{(cfg.lineProds[ln]||[]).forEach(pc=>{const key=`${ln}__${pc}`;if(!assignedSet.has(key))items.push({line:ln,prod:pc,key});});});
  if(!items.length)return '<div style="color:var(--tx3);font-size:13px;padding:8px;border:1px solid var(--bdr);border-radius:4px">모든 제품이 배정되었습니다</div>';
  const rows=items.map(it=>{
    const uid=`un_${safeId(it.line)}_${safeId(it.prod)}`;
    const checks=cfg.admins.map(a=>`<label><input type="checkbox" value="${esc(a.name)}" onchange="onUnassignedCheck('${esc(it.line)}','${esc(it.prod)}',this)"> ${esc(a.name)}</label>`).join('')||'<div style="color:var(--tx3);font-size:12px;padding:4px">등록된 관리자 없음</div>';
    return `<div style="display:flex;align-items:center;gap:6px;padding:4px 2px;border-bottom:1px solid var(--bdr)">
      <span style="flex:1;font-size:13px;color:var(--tx2)">${esc(it.line)} - ${esc(it.prod)}${cfg.prodNames[it.prod]?'('+esc(cfg.prodNames[it.prod])+')':''}</span>
      <div class="msel" id="msel_wrap_${uid}" style="width:160px">
        <button type="button" class="dsel msel-btn" style="font-size:12px;padding:5px 8px" onclick="toggleMsel('${uid}')"><span id="msel_label_${uid}">관리자 선택...</span><span>▾</span></button>
        <div class="msel-panel" id="msel_panel_${uid}" style="display:none">${checks}</div>
      </div>
    </div>`;
  }).join('');
  return `<div style="max-height:280px;overflow-y:auto;border:1px solid var(--bdr);border-radius:4px;padding:2px 8px 2px 2px">${rows}</div>`;
}
function onUnassignedCheck(line,prod,checkboxEl){
  const adminName=checkboxEl.value;
  if(checkboxEl.checked){
    if(!cfg.assignments.some(x=>x.admin===adminName&&x.line===line&&x.prod===prod))cfg.assignments.push({line,prod,admin:adminName});
  }else{
    cfg.assignments=cfg.assignments.filter(x=>!(x.admin===adminName&&x.line===line&&x.prod===prod));
  }
  saveStore();
  const uid=`un_${safeId(line)}_${safeId(prod)}`;
  const cnt=cfg.assignments.filter(x=>x.line===line&&x.prod===prod).length;
  const lbl=document.getElementById(`msel_label_${uid}`);
  if(lbl)lbl.textContent=cnt?`${cnt}명 배정됨`:'관리자 선택...';
  // also refresh matching admin's own product-select label/checkbox state if visible
  const idx=cfg.admins.findIndex(a=>a.name===adminName);
  if(idx>=0){
    const cb=document.querySelector(`#msel_panel_adm${idx} input[value="${CSS.escape(line+'__'+prod)}"]`);
    if(cb)cb.checked=checkboxEl.checked;
    const acnt=cfg.assignments.filter(x=>x.admin===adminName).length;
    const albl=document.getElementById(`msel_label_adm${idx}`);
    if(albl)albl.textContent=acnt?`${acnt}개 제품 배정됨`:'제품 선택...';
  }
}
function onAdminProdCheck(idx,checkboxEl){
  const a=cfg.admins[idx];if(!a)return;
  const parts=checkboxEl.value.split('__');const line=parts[0],prod=parts[1];
  if(checkboxEl.checked){
    if(!cfg.assignments.some(x=>x.admin===a.name&&x.line===line&&x.prod===prod))cfg.assignments.push({line,prod,admin:a.name});
  }else{
    cfg.assignments=cfg.assignments.filter(x=>!(x.admin===a.name&&x.line===line&&x.prod===prod));
  }
  saveStore();
  const cnt=cfg.assignments.filter(x=>x.admin===a.name).length;
  const lbl=document.getElementById(`msel_label_adm${idx}`);
  if(lbl)lbl.textContent=cnt?`${cnt}개 제품 배정됨`:'제품 선택...';
}
function addAdmin(){
  const nameInp=document.getElementById('addAdmName'),emailInp=document.getElementById('addAdmEmail');
  const name=(nameInp?nameInp.value:'').trim(),email=(emailInp?emailInp.value:'').trim();
  if(!name){alert('관리자 이름을 입력하세요.');return;}
  if(!isValidEmail(email)){alert(EMAIL_DOMAIN_ERR);return;}
  if(cfg.admins.some(a=>a.name===name)){alert('이미 등록된 관리자 이름입니다.');return;}
  if(cfg.admins.some(a=>a.email===email)){alert('이미 등록된 이메일 주소입니다.');return;}
  cfg.admins.push({name,email});
  saveStore();document.getElementById('cfgBody').innerHTML=renderAlerts();showToast('관리자 추가됨','ok');
}
function renameAdminName(idx){
  const a=cfg.admins[idx];if(!a)return;
  const nv=prompt(`이름 수정 (현재: ${a.name})`,a.name);
  if(!nv||nv.trim()===''||nv.trim()===a.name)return;
  const newName=nv.trim();
  if(cfg.admins.some((x,i)=>i!==idx&&x.name===newName)){alert('이미 등록된 관리자 이름입니다.');return;}
  cfg.assignments.forEach(x=>{if(x.admin===a.name)x.admin=newName;});
  a.name=newName;
  saveStore();document.getElementById('cfgBody').innerHTML=renderAlerts();showToast('저장됨','ok');
}
function renameAdminEmail(idx){
  const a=cfg.admins[idx];if(!a)return;
  const nv=prompt(`이메일 수정 (현재: ${a.email})`,a.email);
  if(nv===null)return;
  const newEmail=nv.trim();
  if(!isValidEmail(newEmail)){alert(EMAIL_DOMAIN_ERR);return;}
  if(newEmail===a.email)return;
  if(cfg.admins.some((x,i)=>i!==idx&&x.email===newEmail)){alert('이미 등록된 이메일 주소입니다.');return;}
  a.email=newEmail;
  saveStore();document.getElementById('cfgBody').innerHTML=renderAlerts();showToast('저장됨','ok');
}
function removeAdmin(idx){
  const a=cfg.admins[idx];if(!a)return;
  if(!confirm(`${a.name}${josaRL(a.name)} 삭제하시겠습니까? (배정된 제품도 함께 해제됩니다)`))return;
  cfg.assignments=cfg.assignments.filter(x=>x.admin!==a.name);
  cfg.admins.splice(idx,1);
  saveStore();document.getElementById('cfgBody').innerHTML=renderAlerts();showToast('삭제됨','ok');
}
function saveAlerts(){saveStore();render();showToast('알림 발송 설정 저장됨','ok');}

// ═══ EXCEL (RDE — all data in RDE table + stats) ═══
function exportExcel(){
  _collectAndSaveRde();
  const rl=rdeSelLine||curLine,rp=rdeSelProd||curProd,rd=rdeSelDim||curDim;
  const rpName=cfg.prodNames[rp]||'';
  const key=rdeKey();ensureData(key);const pd=allData[key];
  const spec=cfg.specs[`${rl}__${rp}__${rd}`]||{lsl:null,usl:null};
  // Use ALL data from this combo (complete + pending)
  const allRows=[...pd.complete,...pd.pending].sort((a,b)=>dateNum(a.date)-dateNum(b.date));
  const stats=calcStats(pd.complete);
  let vX={},vR={};
  if(stats&&pd.complete.length>=2){
    Object.assign(vX,nelsonCheck(pd.complete.map(d=>validVals(d.values).reduce((s,v)=>s+v,0)/Math.max(validVals(d.values).length,1)),stats.xbb,stats.UCLx,stats.LCLx,stats.sx,false));
    Object.assign(vR,nelsonCheck(pd.complete.map(d=>{const vv=validVals(d.values);return vv.length>1?Math.max(...vv)-Math.min(...vv):0;}),stats.Rb,stats.UCLr,stats.LCLr,stats.sr,true));
  }
  const avX=new Set(Object.values(vX).flat()),avR=new Set(Object.values(vR).flat());
  const wb=XLSX.utils.book_new();
  // Build rows: data columns A-K, stats further right
  const headerRow=['라인','품번','품명','치수','날짜','x1','x2','x3','x4','x5','x6','X̄','R','판정(X̄)','판정(R)','','','통계(X̄)','통계(R)'];
  const dataRows=[];
  const statLabels=['USL','UCL','X̄̄ / R̄','LCL','LSL','n','군 개수'];
  const statValsX=[
    spec.usl!=null?+spec.usl:'',
    stats?+stats.UCLx.toFixed(4):'',
    stats?+stats.xbb.toFixed(4):'',
    stats?+stats.LCLx.toFixed(4):'',
    spec.lsl!=null?+spec.lsl:'',
    cfg.n,
    pd.complete.length
  ];
  const statValsR=[
    '',
    stats?+stats.UCLr.toFixed(4):'',
    stats?+stats.Rb.toFixed(4):'',
    stats?+stats.LCLr.toFixed(4):'',
    '','','',
  ];
  allRows.forEach((d,i)=>{
    const vv=validVals(d.values);const xb=vv.length?vv.reduce((s,v)=>s+v,0)/vv.length:0;const R=vv.length>1?Math.max(...vv)-Math.min(...vv):0;
    const compIdx=pd.complete.findIndex(c=>c.date===d.date);
    const jX=compIdx>=0?avX.has(compIdx)?'위반':'정상':'—';const jR=compIdx>=0?avR.has(compIdx)?'위반':'정상':'—';
    const statLbl=i<statLabels.length?statLabels[i]:'';const sX=i<statValsX.length?statValsX[i]:'';const sR=i<statValsR.length?statValsR[i]:'';
    const dateVal=(d.date&&d.date.indexOf('-')>=0)?new Date(d.date+'T00:00:00'):d.date;
    dataRows.push([rl,rp,rpName,rd,dateVal,d.values[0]??'',d.values[1]??'',d.values[2]??'',d.values[3]??'',d.values[4]??'',d.values[5]??'',+xb.toFixed(4),+R.toFixed(4),jX,jR,'',statLbl,sX,sR]);
  });
  // Fill remaining stat rows if data rows < 7
  for(let i=dataRows.length;i<statLabels.length;i++){
    dataRows.push(Array(16).fill('').concat([statLabels[i],statValsX[i],statValsR[i]]));
  }
  const ws=XLSX.utils.aoa_to_sheet([headerRow,...dataRows]);
  XLSX.utils.book_append_sheet(wb,ws,'로데이터');
  XLSX.writeFile(wb,`XbarR_${rl}_${rp}${rd}_${new Date().toISOString().slice(0,10)}.xlsx`);
  showToast('Excel 저장됨','ok');
}

// ═══ STORAGE & TOAST ═══
function saveStore(){
  try{localStorage.setItem('xrr6_cfg',JSON.stringify(cfg));}catch(e){}
  saveDataToFirebase();
  saveCfgToFirebase();
}
function saveCfgToFirebase(){
  fetch(FB_DB_URL+'/cfgBlob.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(JSON.stringify(cfg))})
    .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);})
    .catch(e=>{console.error(e);showToast('설정 저장 실패: '+e.message,'warn');});
}
function loadCfgFromFirebase(cb){
  fetch(FB_DB_URL+'/cfgBlob.json')
    .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(str=>{
      if(str){try{cfg=JSON.parse(str);}catch(e){}}
      ensureCfgDefaults();
      cb&&cb();
    })
    .catch(e=>{console.error(e);ensureCfgDefaults();cb&&cb();});
}
function saveDataToFirebase(){
  fetch(FB_DB_URL+'/dataBlob.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(JSON.stringify(allData))})
    .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);})
    .catch(e=>{console.error(e);showToast('Firebase 저장 실패: '+e.message,'warn');});
}
function loadDataFromFirebase(cb){
  fetch(FB_DB_URL+'/dataBlob.json')
    .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(str=>{allData=str?JSON.parse(str):{};cb&&cb();})
    .catch(e=>{console.error(e);showToast('데이터 불러오기 실패: '+e.message,'warn');cb&&cb();});
}
let toastT=null;
function showToast(msg,type='ok'){const el=document.getElementById('toast');el.textContent=msg;el.style.background=type==='warn'?'#d29922':'#3fb950';el.classList.add('show');if(toastT)clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2500);}

window.addEventListener('load',()=>{
  loadCfgFromFirebase(()=>{
    loadDataFromFirebase(()=>{
      init();
      restorePendingInputs();
      // Attach date shorthand handler after DOM ready
      const inp=document.getElementById('inDate');
      if(inp)inp.addEventListener('blur',handleDateShorthand);
    });
  });
});
</script>
